<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório — Dark UX Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script>
  // Mesma URL do Apps Script usada no index.html
  window.SHEETS_URL = "https://script.google.com/macros/s/AKfycbyC99Xa0SEnlZtibb30O8v_7kiSO0gTHmN8B1CRrnlcqNewM9j8GTtGILFMHtBySAC3XQ/exec";
</script>

<style>
  :root {
    --bg: #f7f4ec;
    --surface: #fffdf8;
    --surface-strong: #fff5df;
    --ink: #181410;
    --muted: #5c554c;
    --border: #d9cebd;
    --accent: #d43d1f;
    --accent-soft: #ffe0d4;
    --blue: #1f6feb;
    --blue-soft: #dce9ff;
    --green: #16784c;
    --green-soft: #dff4e8;
    --purple: #7756c9;
    --purple-soft: #ebe4ff;
    --warn: #a96700;
    --good: #157f3f;
    --body: 'Atkinson Hyperlegible', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --shadow: 0 10px 28px rgba(24, 20, 16, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }
  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background-image:
      linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 244, 236, 0.96)),
      radial-gradient(circle at 8% 10%, rgba(31, 111, 235, 0.13) 0%, transparent 34%),
      radial-gradient(circle at 92% 18%, rgba(212, 61, 31, 0.12) 0%, transparent 32%);
  }
  body { overflow-x: hidden; }

  .container { width: 100%; max-width: 1360px; margin: 0 auto; padding: 32px 28px 48px; }
  .hero-stats, .calls-grid, .visual-grid,
  .hero-stat, .call-card, .bar-list, .plan-card { min-width: 0; width: 100%; max-width: 100%; }

  /* ===== HEADER ===== */
  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; flex-wrap: wrap; gap: 18px;
    border-bottom: 3px solid var(--ink); padding-bottom: 20px;
  }
  .title-block { flex: 1; min-width: 280px; }
  .eyebrow {
    font-family: var(--mono); font-size: 13px;
    letter-spacing: 0; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
    font-weight: 700;
  }
  h1 {
    font-family: var(--body); font-weight: 700;
    font-size: clamp(42px, 5vw, 78px); line-height: 1.02;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }
  h1 em { font-style: normal; color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 22px; margin-top: 8px; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: 2px solid var(--ink);
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
    font-family: var(--mono); color: var(--ink);
    box-shadow: var(--shadow);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good); animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
  }

  /* ===== HERO STATS ===== */
  .hero-stats {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .hero-stat {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; padding: 22px; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .hero-stat.primary { background: var(--ink); border-color: var(--ink); color: white; }
  .hero-stat.primary .hero-stat-label,
  .hero-stat.primary .hero-stat-extra,
  .hero-stat.primary .hero-stat-suffix { color: rgba(255,255,255,0.78); }
  .hero-stat.accent { border-color: var(--accent); background: var(--surface-strong); }
  .hero-stat.blue { border-color: var(--blue); background: var(--blue-soft); }
  .hero-stat.green { border-color: var(--green); background: var(--green-soft); }
  .hero-stat-label {
    font-family: var(--mono); font-size: 13px;
    letter-spacing: 0; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
    font-weight: 700;
  }
  .hero-stat-value {
    font-family: var(--body); font-weight: 700;
    font-size: clamp(52px, 5.4vw, 86px); line-height: 0.95; letter-spacing: 0;
    color: var(--ink);
    overflow-wrap: anywhere;
  }
  .hero-stat.primary .hero-stat-value { color: white; }
  .hero-stat-suffix { font-size: 32px; color: var(--muted); }
  .hero-stat-extra {
    font-size: 17px; color: var(--muted); margin-top: 10px;
  }
  .hero-meter {
    height: 12px; background: rgba(24,20,16,0.12); border-radius: 999px;
    overflow: hidden; margin-top: 16px;
  }
  .hero-meter span {
    display: block; height: 100%; background: currentColor; border-radius: inherit;
  }

  /* ===== CHAMADAS PRINCIPAIS (cartões grandes) ===== */
  .calls-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .call-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; padding: 24px; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .call-card.featured {
    background: var(--accent-soft);
    border-color: var(--accent);
    grid-column: span 2;
  }
  .call-card.blue { background: var(--blue-soft); border-color: var(--blue); }
  .call-card.green { background: var(--green-soft); border-color: var(--green); }
  .call-card.purple { background: var(--purple-soft); border-color: var(--purple); }
  .call-number {
    font-family: var(--body); font-size: 72px; font-weight: 700;
    line-height: 0.9; color: var(--accent); margin-bottom: 12px;
  }
  .call-card.blue .call-number { color: var(--blue); }
  .call-card.green .call-number { color: var(--green); }
  .call-card.purple .call-number { color: var(--purple); }
  .call-headline {
    font-family: var(--body); font-weight: 700;
    font-size: 26px; line-height: 1.15; letter-spacing: 0;
    margin-bottom: 12px;
  }
  .call-card.featured .call-headline { font-size: 34px; }
  .call-desc {
    color: var(--muted); font-size: 18px; line-height: 1.4;
  }
  .pattern-tag {
    display: inline-block; font-family: var(--mono);
    font-size: 12px; letter-spacing: 0; text-transform: uppercase;
    color: var(--ink); background: rgba(255,255,255,0.72);
    padding: 6px 10px; border-radius: 6px; margin-top: 18px;
    border: 1px solid rgba(24,20,16,0.16); font-weight: 700;
  }

  /* ===== SEÇÕES ===== */
  section { margin-bottom: 34px; }
  .section-title {
    font-family: var(--body); font-weight: 700;
    font-size: 34px; letter-spacing: 0;
    margin-bottom: 14px; display: flex; align-items: baseline; gap: 14px;
    color: var(--ink);
  }
  .section-title small {
    font-family: var(--mono); font-size: 13px;
    color: var(--muted); font-weight: 400;
    letter-spacing: 0; text-transform: uppercase;
  }

  /* ===== TABELA DE CULPADOS ===== */
  .culprits-list {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; overflow: hidden; box-shadow: var(--shadow);
  }
  .culprit-row {
    display: grid; grid-template-columns: 72px 1fr minmax(180px, 34%) 86px;
    padding: 18px 22px; border-bottom: 1px solid var(--border);
    align-items: center; gap: 16px;
  }
  .culprit-row:last-child { border-bottom: none; }
  .culprit-rank {
    width: 48px; height: 48px; border-radius: 8px; display: grid; place-items: center;
    background: var(--ink); color: white; font-size: 24px; font-weight: 700;
  }
  .culprit-name {
    font-family: var(--body); font-size: 24px; font-weight: 700;
  }
  .culprit-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .culprit-tag {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0;
    text-transform: uppercase; padding: 4px 8px; border-radius: 6px;
    background: var(--accent-soft); color: var(--ink); font-weight: 700;
  }
  .score-track {
    height: 18px; border-radius: 999px; background: #eee4d6;
    overflow: hidden; border: 1px solid var(--border);
  }
  .score-fill {
    height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--accent), var(--warn));
  }
  .culprit-score {
    font-family: var(--body); font-weight: 700;
    font-size: 34px; color: var(--accent); line-height: 1; text-align: right;
  }
  .culprit-score small { font-size: 16px; color: var(--muted); }

  /* ===== BARRAS HORIZONTAIS ===== */
  .bar-list {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; padding: 20px; box-shadow: var(--shadow);
  }
  .bar-item { margin-bottom: 20px; }
  .bar-item:last-child { margin-bottom: 0; }
  .bar-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px; gap: 14px;
  }
  .bar-label { font-size: 21px; font-weight: 700; }
  .bar-label-pattern {
    display: block;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0;
    color: var(--muted); text-transform: uppercase;
    margin-top: 2px;
  }
  .bar-value {
    font-family: var(--body); font-weight: 700; font-size: 26px;
    font-variant-numeric: tabular-nums; color: var(--accent);
  }
  .bar-value small { color: var(--muted); font-size: 16px; font-weight: 400; }
  .bar-track {
    height: 24px; background: #eee4d6; border-radius: 999px;
    overflow: hidden; border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff8855);
    border-radius: inherit; transition: width 1s ease;
  }

  .visual-grid {
    display: grid; grid-template-columns: 1.25fr 0.75fr;
    gap: 14px;
  }
  .plan-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 8px; padding: 20px; box-shadow: var(--shadow);
  }
  .stacked-bar {
    display: flex; height: 54px; border-radius: 8px; overflow: hidden;
    border: 2px solid var(--ink); background: #eee4d6; margin: 14px 0;
  }
  .stacked-segment {
    display: grid; place-items: center; min-width: 36px;
    color: white; font-weight: 700; font-size: 18px;
  }
  .stacked-free { background: var(--green); }
  .stacked-pro { background: var(--accent); }
  .stacked-ultra { background: var(--purple); }
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted);
    font-size: 17px; font-weight: 700;
  }
  .legend-dot {
    display: inline-block; width: 14px; height: 14px; border-radius: 3px;
    margin-right: 6px; vertical-align: -1px;
  }

  /* ===== ESTADO VAZIO / LOADING ===== */
  .empty {
    text-align: center; padding: 80px 20px; color: var(--muted);
    background: var(--surface); border: 2px solid var(--border); border-radius: 8px;
  }
  .empty h3 { font-family: var(--body); font-size: 34px; color: var(--ink); margin-bottom: 8px; }
  .empty p { font-size: 20px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== CONTROLES ===== */
  .controls {
    display: flex; gap: 10px; margin-bottom: 22px;
    flex-wrap: wrap; align-items: center;
  }
  .btn {
    background: var(--surface); border: 2px solid var(--border);
    color: var(--ink); padding: 12px 18px; border-radius: 8px;
    font-family: var(--body); font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  #lastUpdate { color: var(--muted); font-size: 16px; margin-left: auto; }

  .footer-note {
    text-align: center; color: var(--muted); font-size: 14px;
    font-family: var(--mono); margin-top: 36px; padding-top: 22px;
    border-top: 2px solid var(--border);
  }

  @media (max-width: 1000px) {
    .hero-stats, .calls-grid, .visual-grid { grid-template-columns: 1fr 1fr; }
    .call-card.featured { grid-column: span 2; }
    .culprit-row { grid-template-columns: 52px 1fr 82px; }
    .score-track { display: none; }
  }
  @media (max-width: 700px) {
    .container { padding: 22px 14px; }
    .hero-stats, .calls-grid, .visual-grid { grid-template-columns: 1fr; }
    .call-card.featured { grid-column: span 1; }
    .hero-stat-value { font-size: 50px; }
    .call-number { font-size: 58px; }
    .call-headline { font-size: 24px !important; }
    .culprit-row { grid-template-columns: 48px 1fr; }
    .culprit-score { grid-column: 2; text-align: left; }
    #lastUpdate { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="title-block">
      <div class="eyebrow">Apresentação de Ética · Dark UX Patterns</div>
      <h1>Quem caiu nas <em>armadilhas</em>?</h1>
      <p class="subtitle">Relatório em tempo real das respostas da turma.</p>
    </div>
    <div class="live-pill">
      <span class="live-dot"></span>
      <span id="liveStatus">Conectado · atualizando</span>
    </div>
  </header>

  <div class="controls">
    <button class="btn" onclick="reload()">↻ Atualizar agora</button>
    <button class="btn active" id="autoBtn" onclick="toggleAuto()">⏱ Auto-refresh: ON</button>
    <span id="lastUpdate">—</span>
  </div>

  <main id="content">
    <div class="empty">
      <div class="spinner"></div>
      <p>Carregando respostas...</p>
    </div>
  </main>

  <div class="footer-note">
    Dark UX Patterns · Insper · Ética em Computação
  </div>
</div>

<script>
let respostas = [];
let autoRefresh = true;
let autoInterval = null;

function pct(part, total) {
  if (!total) return 0;
  return Math.round((part / total) * 100);
}

function asBool(v) {
  if (typeof v === 'boolean') return v;
  if (typeof v === 'string') return v.toLowerCase() === 'true' || v === '1';
  return false;
}

function buildSheetsUrl(params = {}) {
  const url = new URL(window.SHEETS_URL);
  for (const [key, value] of Object.entries(params)) {
    url.searchParams.set(key, value);
  }
  return url.toString();
}

function normalizeData(data) {
  if (Array.isArray(data)) {
    return { ok: true, total: data.length, respostas: data };
  }
  if (data && Array.isArray(data.respostas)) return data;
  if (data && Array.isArray(data.data)) {
    return { ...data, ok: data.ok !== false, total: data.total ?? data.data.length, respostas: data.data };
  }
  if (data && Array.isArray(data.records)) {
    return { ...data, ok: data.ok !== false, total: data.total ?? data.records.length, respostas: data.records };
  }
  return data;
}

async function fetchJsonData() {
  const response = await fetch(buildSheetsUrl({ t: Date.now() }), { cache: 'no-store' });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return response.json();
}

/**
 * Fallback via JSONP caso o navegador bloqueie fetch/CORS.
 * Apps Script aceita ?callback=xxx e devolve `xxx({...})` como JS.
 */
function fetchJsonpData() {
  return new Promise((resolve, reject) => {
    const cbName = '__darkux_cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('timeout'));
    }, 15000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
    }
    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    script.onerror = () => { cleanup(); reject(new Error('script error')); };
    script.src = buildSheetsUrl({ callback: cbName, t: Date.now() });
    document.body.appendChild(script);
  });
}

async function fetchData() {
  try {
    return await fetchJsonData();
  } catch (fetchError) {
    console.warn('Fetch JSON falhou; tentando JSONP:', fetchError);
    return fetchJsonpData();
  }
}

async function reload() {
  document.getElementById('liveStatus').textContent = 'Atualizando...';
  try {
    const data = normalizeData(await fetchData());
    window.__lastDashboardData = data;
    if (data && data.ok && Array.isArray(data.respostas)) {
      respostas = data.respostas;
      render();
      document.getElementById('liveStatus').textContent = 'Conectado · atualizando';
      document.getElementById('lastUpdate').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
    } else {
      throw new Error('resposta inválida');
    }
  } catch(e) {
    console.error(e);
    document.getElementById('liveStatus').textContent = 'Erro ao conectar';
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <h3>Não consegui carregar os dados</h3>
        <p>Verifique se o Apps Script foi reimplantado depois das mudanças do GET. ${escapeHtml(e.message)}</p>
      </div>
    `;
  }
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('autoBtn');
  if (autoRefresh) {
    btn.classList.add('active');
    btn.textContent = '⏱ Auto-refresh: ON';
    autoInterval = setInterval(reload, 15000);
  } else {
    btn.classList.remove('active');
    btn.textContent = '⏱ Auto-refresh: OFF';
    clearInterval(autoInterval);
  }
}

function render() {
  const total = respostas.length;
  if (total === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <h3>Aguardando primeiras vítimas...</h3>
        <p>Quando os alunos começarem a responder, os dados aparecem aqui automaticamente.</p>
      </div>
    `;
    return;
  }

  // Calcula métricas
  const m = {
    aceitouTermos: respostas.filter(r => asBool(r.aceitouTermos)).length,
    newsletter: respostas.filter(r => asBool(r.aceitouNewsletter)).length,
    compartilhar47: respostas.filter(r => asBool(r.pref_compartilhar47)).length,
    naoExcluido: respostas.filter(r => asBool(r.pref_naoExcluido)).length,
    naoOfertas: respostas.filter(r => asBool(r.pref_naoOfertas)).length,
    backup: respostas.filter(r => asBool(r.addon_backup)).length,
    antivirus: respostas.filter(r => asBool(r.addon_antivirus)).length,
    seguro: respostas.filter(r => asBool(r.addon_seguro)).length,
    cartao: respostas.filter(r => asBool(r.forneceuCartao)).length,
    convidouAmigos: respostas.filter(r => asBool(r.convidouAmigos)).length,
    permitiuSpam: respostas.filter(r => asBool(r.permitiuSpam)).length,
    timeout: respostas.filter(r => r.timeoutEm && String(r.timeoutEm).startsWith('step_')).length,
    planoFree: respostas.filter(r => r.planoEscolhido === 'free').length,
    planoPro: respostas.filter(r => r.planoEscolhido === 'pro').length,
    planoUltra: respostas.filter(r => r.planoEscolhido === 'ultra').length,
  };

  // Calcula "score de vulnerabilidade" por aluno
  const scored = respostas.map(r => {
    const tags = [];
    let score = 0;
    if (asBool(r.aceitouTermos)) { score++; tags.push('Alma'); }
    if (asBool(r.aceitouNewsletter)) { score++; tags.push('Newsletter'); }
    if (asBool(r.pref_compartilhar47)) { score++; tags.push('47 parceiros'); }
    if (asBool(r.addon_backup)) { score++; tags.push('Backup'); }
    if (asBool(r.addon_antivirus)) { score++; tags.push('Antivírus'); }
    if (asBool(r.addon_seguro)) { score++; tags.push('Seguro'); }
    if (asBool(r.forneceuCartao)) { score++; tags.push('Cartão'); }
    if (asBool(r.convidouAmigos)) { score++; tags.push('Friend Spam'); }
    return { nome: r.nome || '(anônimo)', score, tags };
  }).sort((a, b) => b.score - a.score);

  const top5 = scored.slice(0, 5);

  // Adicionais "embutidos sem perceber" (todos 3 marcados)
  const todosAddons = respostas.filter(r =>
    asBool(r.addon_backup) && asBool(r.addon_antivirus) && asBool(r.addon_seguro)
  ).length;

  const html = `
    <!-- HERO STATS -->
    <div class="hero-stats">
      <div class="hero-stat primary">
        <div class="hero-stat-label">Total de respostas</div>
        <div class="hero-stat-value">${total}</div>
        <div class="hero-stat-extra">${m.timeout} não terminaram a tempo</div>
      </div>
      <div class="hero-stat accent">
        <div class="hero-stat-label">Aceitaram os termos</div>
        <div class="hero-stat-value">${pct(m.aceitouTermos, total)}<span class="hero-stat-suffix">%</span></div>
        <div class="hero-stat-extra">${m.aceitouTermos} de ${total} pessoas</div>
        <div class="hero-meter" style="color: var(--accent);"><span style="width:${pct(m.aceitouTermos, total)}%"></span></div>
      </div>
      <div class="hero-stat blue">
        <div class="hero-stat-label">Cartão informado</div>
        <div class="hero-stat-value">${pct(m.cartao, total)}<span class="hero-stat-suffix">%</span></div>
        <div class="hero-stat-extra">${m.cartao} pessoa(s) confiaram demais</div>
        <div class="hero-meter" style="color: var(--blue);"><span style="width:${pct(m.cartao, total)}%"></span></div>
      </div>
      <div class="hero-stat green">
        <div class="hero-stat-label">Caíram em 5 ou mais</div>
        <div class="hero-stat-value">${scored.filter(s => s.score >= 5).length}</div>
        <div class="hero-stat-extra">vítimas múltiplas</div>
        <div class="hero-meter" style="color: var(--green);"><span style="width:${pct(scored.filter(s => s.score >= 5).length, total)}%"></span></div>
      </div>
    </div>

    <!-- CHAMADAS GRANDES -->
    <section>
      <div class="calls-grid">
        <div class="call-card featured">
          <div class="call-number">${m.aceitouTermos}</div>
          <div class="call-headline">
            ${m.aceitouTermos === 1 ? 'pessoa vendeu' : 'pessoas venderam'} a alma no contrato
          </div>
          <div class="call-desc">
            Aceitaram termos com cláusulas de cessão de alma, nomeação do primogênito por R$ 3,50, doação do rim direito como garantia de pagamento e publicação de conversas privadas no Instagram.
          </div>
          <span class="pattern-tag">Privacy Zuckering</span>
        </div>

        <div class="call-card blue">
          <div class="call-number">${m.cartao}</div>
          <div class="call-headline">
            ${m.cartao === 1 ? 'aluno digitou' : 'alunos digitaram'} dados de cartão
          </div>
          <div class="call-desc">
            Aceitaram cobrança automática mensal de R$ 49 + adicionais. Cancelamento exigia ligar entre 3h e 4h da manhã.
          </div>
          <span class="pattern-tag">Forced Continuity</span>
        </div>

        <div class="call-card green">
          <div class="call-number">${todosAddons}</div>
          <div class="call-headline">
            ${todosAddons === 1 ? 'levou' : 'levaram'} os 3 adicionais
          </div>
          <div class="call-desc">
            Backup (R$19) + Antivírus (R$14) + Seguro (R$9) já vinham marcados. Total: R$ 42 a mais por mês.
          </div>
          <span class="pattern-tag">Sneak into Basket</span>
        </div>

        <div class="call-card purple">
          <div class="call-number">${m.compartilhar47}</div>
          <div class="call-headline">
            ${m.compartilhar47 === 1 ? 'autorizou' : 'autorizaram'} 47 parceiros
          </div>
          <div class="call-desc">
            Caíram na pergunta com dupla negação e checkboxes pré-marcados.
          </div>
          <span class="pattern-tag">Trick Question</span>
        </div>

        <div class="call-card">
          <div class="call-number">${m.convidouAmigos}</div>
          <div class="call-headline">
            ${m.convidouAmigos === 1 ? 'aluno expôs amigos' : 'alunos expuseram amigos'} ao spam
          </div>
          <div class="call-desc">
            Forneceram e-mails de outras pessoas pra receberem convites em seu nome.
          </div>
          <span class="pattern-tag">Friend Spam</span>
        </div>

        <div class="call-card blue">
          <div class="call-number">${m.newsletter}</div>
          <div class="call-headline">
            ${m.newsletter === 1 ? 'caiu' : 'caíram'} no botão constrangedor
          </div>
          <div class="call-desc">
            Aceitaram a newsletter porque o botão "não" dizia que a pessoa preferia "continuar perdendo tempo e não evoluir profissionalmente".
          </div>
          <span class="pattern-tag">Confirmshaming</span>
        </div>
      </div>
    </section>

    <!-- TOP 5 VÍTIMAS -->
    <section>
      <div class="section-title">
        Top 5 vítimas <small>quem caiu em mais armadilhas</small>
      </div>
      <div class="culprits-list">
        ${top5.map((s, i) => `
          <div class="culprit-row">
            <div class="culprit-rank">${i + 1}</div>
            <div>
              <div class="culprit-name">${escapeHtml(s.nome)}</div>
              <div class="culprit-tags">
                ${s.tags.length ? s.tags.map(t => `<span class="culprit-tag">${escapeHtml(t)}</span>`).join('') : '<span class="culprit-tag">sem armadilhas</span>'}
              </div>
            </div>
            <div class="score-track"><div class="score-fill" style="width:${pct(s.score, 8)}%"></div></div>
            <div class="culprit-score">${s.score}<small>/8</small></div>
          </div>
        `).join('')}
      </div>
    </section>

    <!-- BARRAS DETALHADAS -->
    <section>
      <div class="section-title">
        Quebra por técnica <small>quanto cada pattern pegou</small>
      </div>
      <div class="bar-list">
        ${barRow('Aceitaram termos absurdos', m.aceitouTermos, total, 'Privacy Zuckering')}
        ${barRow('Aceitaram newsletter (botão humilhante)', m.newsletter, total, 'Confirmshaming')}
        ${barRow('Compartilhar dados com 47 parceiros', m.compartilhar47, total, 'Trick Question')}
        ${barRow('Adicional: Backup (+R$19/mês)', m.backup, total, 'Sneak into Basket')}
        ${barRow('Adicional: Antivírus (+R$14/mês)', m.antivirus, total, 'Sneak into Basket')}
        ${barRow('Adicional: Seguro (+R$9/mês)', m.seguro, total, 'Sneak into Basket')}
        ${barRow('Forneceram cartão de crédito', m.cartao, total, 'Forced Continuity')}
        ${barRow('Convidaram amigos (spam)', m.convidouAmigos, total, 'Friend Spam')}
      </div>
    </section>

    <!-- DISTRIBUIÇÃO DE PLANO -->
    <section>
      <div class="section-title">
        Plano escolhido <small>misdirection — o "Pro" vinha pré-selecionado</small>
      </div>
      <div class="visual-grid">
        <div class="plan-card">
          <div class="stacked-bar">
            ${stackSegment('free', m.planoFree, total)}
            ${stackSegment('pro', m.planoPro, total)}
            ${stackSegment('ultra', m.planoUltra, total)}
          </div>
          <div class="legend">
            <span><span class="legend-dot stacked-free"></span>Básico: ${m.planoFree}</span>
            <span><span class="legend-dot stacked-pro"></span>Pro: ${m.planoPro}</span>
            <span><span class="legend-dot stacked-ultra"></span>Ultra: ${m.planoUltra}</span>
          </div>
        </div>
        <div class="bar-list">
          ${barRow('Básico gratuito', m.planoFree, total)}
          ${barRow('Pro pré-selecionado', m.planoPro, total)}
          ${barRow('Ultra', m.planoUltra, total)}
        </div>
      </div>
    </section>
  `;

  document.getElementById('content').innerHTML = html;
}

function barRow(label, value, total, pattern) {
  const p = pct(value, total);
  return `
    <div class="bar-item">
      <div class="bar-header">
        <div class="bar-label">
          ${escapeHtml(label)}
          ${pattern ? `<span class="bar-label-pattern">${escapeHtml(pattern)}</span>` : ''}
        </div>
        <div class="bar-value">${p}% <small>(${value}/${total})</small></div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width: ${p}%"></div>
      </div>
    </div>
  `;
}

function stackSegment(kind, value, total) {
  const p = pct(value, total);
  if (!value) return '';
  return `<div class="stacked-segment stacked-${kind}" style="width:${p}%">${p}%</div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Inicializa
reload();
autoInterval = setInterval(reload, 15000);
</script>
</body>
</html>
