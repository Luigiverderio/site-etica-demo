/* ============================================================
   TIMER GLOBAL — 5 minutos pra completar tudo
   ============================================================ */
const TOTAL_SECONDS = 3 * 60;
let secondsLeft = TOTAL_SECONDS;
let timerEnded = false;

function startGlobalTimer() {
  const timeEl = document.getElementById('globalTimerTime');
  const barEl = document.getElementById('globalTimerBar');
  const wrapEl = document.getElementById('globalTimer');

  function tick() {
    if (timerEnded) return;
    if (secondsLeft <= 0) {
      timerEnded = true;
      onTimeout();
      return;
    }
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    if (timeEl) timeEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
    const pct = secondsLeft / TOTAL_SECONDS;
    if (barEl) {
      barEl.style.transform = `scaleX(${pct})`;
      // muda gradiente conforme o tempo passa
      barEl.style.backgroundPosition = `${(1 - pct) * 100}% 0`;
    }
    if (wrapEl) {
      if (secondsLeft <= 30) wrapEl.classList.add('warning');
      else wrapEl.classList.remove('warning');
    }
    secondsLeft--;
  }

  tick();
  window.__globalTimer = setInterval(tick, 1000);
}

function onTimeout() {
  if (window.__globalTimer) { clearInterval(window.__globalTimer); window.__globalTimer = null; }
  // Salva o que tem antes de bloquear
  state.responses.timeoutEm = `step_${state.step}`;
  saveToSheets(true);
  // Bloqueia tela
  document.body.insertAdjacentHTML('beforeend', `
    <div class="timeout-overlay">
      <div class="timeout-modal">
        <div style="font-size:48px; margin-bottom:8px;">⏰</div>
        <h3>Tempo esgotado!</h3>
        <p>O tempo para completar o cadastro acabou. Sua sessão foi encerrada.</p>
      </div>
    </div>
  `);
}

/* Salva no Google Sheets via Apps Script.
   Usa form-encoded + no-cors pra evitar preflight CORS. */
async function saveToSheets(final = false) {
  const url = window.SHEETS_URL;
  if (!url || url.includes('COLE_SUA_URL')) {
    console.log('Apps Script URL não configurada — salvando só localmente.');
    return false;
  }
  try {
    const payload = {
      sessionId: state.sessionId,
      startedAt: state.startedAt,
      final: final,
      ...state.responses,
      events: JSON.stringify(state.events),
    };
    const formBody = new URLSearchParams();
    for (const [k, v] of Object.entries(payload)) {
      formBody.append(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
    }
    await fetch(url, { method: 'POST', mode: 'no-cors', body: formBody });
    return true;
  } catch(e) {
    console.warn('Falha ao salvar no Sheets:', e);
    return false;
  }
}

      <button class="btn btn-ghost" onclick="handleNewsletter(false)" style="text-align:left;">Não, eu prefiro continuar perdendo tempo e não evoluir profissionalmente</button>
    </div>
  `,
});
window.handleNewsletter = (aceitou) => {
  state.responses.aceitouNewsletter = aceitou;
  logEvent('newsletter', { aceitou });
  next();
};

screens.push({
  render: () => `
    <div class="step-counter">Etapa 4 de 7</div>
    <h2>Preferências de comunicação</h2>
    <p>Marque suas preferências abaixo:</p>
    <div class="pre-checked-list">
      <div class="checkbox-row">
        <input type="checkbox" id="pref1">
        <label for="pref1">Eu <strong>NÃO</strong> desejo receber comunicações sobre ofertas e promoções dos parceiros.</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="pref2" checked>
        <label for="pref2">Eu concordo em <strong>NÃO</strong> ser excluído da lista de envio de e-mails de marketing direcionado.</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="pref3" checked>
        <label for="pref3">Eu autorizo o compartilhamento dos meus dados com até 47 parceiros estratégicos para fins de personalização.</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="handleStep3()">Salvar preferências →</button>
    </div>
  `,
  validate: () => {
    state.responses.pref_naoOfertas = document.getElementById('pref1').checked;
    state.responses.pref_naoExcluido = document.getElementById('pref2').checked;
    state.responses.pref_compartilhar47 = document.getElementById('pref3').checked;
    return true;
  }
});
window.handleStep3 = () => { if (screens[3].validate()) next(); };

screens.push({
  render: () => `
    <div class="step-counter">Etapa 5 de 7</div>
    <div class="urgency-banner">
      <span class="urgency-icon">🔥</span>
      <div>Oferta especial expira em <span class="timer" id="timer">01:00</span> — não perca!</div>
    </div>
    <h2>Escolha seu plano</h2>
    <p>Comece com 7 dias grátis. Cancele quando quiser*.</p>
    <div class="plan-card" onclick="selectPlan('free', this)" id="plan-free">
      <div class="plan-name">Básico</div>
      <div class="plan-price">R$ 0 <small>/ para sempre</small></div>
      <div class="plan-extras">Recursos limitados • Anúncios • Sem suporte</div>
    </div>
    <div class="plan-card recommended selected" onclick="selectPlan('pro', this)" id="plan-pro">
      <div class="plan-name">Pro</div>
      <div class="plan-price"><span class="strike">R$ 89</span> R$ 49 <small>/ mês</small></div>
      <div class="plan-extras">Tudo do Básico + recursos premium + suporte prioritário</div>
    </div>
    <div class="plan-card" onclick="selectPlan('ultra', this)" id="plan-ultra">
      <div class="plan-name">Ultra</div>
      <div class="plan-price">R$ 149 <small>/ mês</small></div>
      <div class="plan-extras">Tudo do Pro + IA avançada + integrações ilimitadas</div>
    </div>
    <div class="pre-checked-list" style="margin-top:24px;">
      <div style="font-weight:600; margin-bottom:8px; font-size:13px;">Adicionais recomendados:</div>
      <div class="checkbox-row">
        <input type="checkbox" id="addon1" checked>
        <label for="addon1">Backup Cloud Premium <span style="color:var(--muted)">(+R$ 19/mês)</span></label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="addon2" checked>
        <label for="addon2">Antivírus NebulaShield™ <span style="color:var(--muted)">(+R$ 14/mês)</span></label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="addon3" checked>
        <label for="addon3">Seguro contra perda de produtividade <span style="color:var(--muted)">(+R$ 9/mês)</span></label>
      </div>
    </div>
    <p class="small-print">*Cancelamento sujeito aos termos. Renovação automática ativada por padrão.</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="handleStep4()">Continuar com plano Pro →</button>
    </div>
  `,
  validate: () => {
    state.responses.planoEscolhido = window.__selectedPlan || 'pro';
    state.responses.addon_backup = document.getElementById('addon1').checked;
    state.responses.addon_antivirus = document.getElementById('addon2').checked;
    state.responses.addon_seguro = document.getElementById('addon3').checked;
    return true;
  },
  onMount: () => {
    window.__selectedPlan = 'pro';
    let secs = 60;
    const tEl = document.getElementById('timer');
    window.__timerInterval = setInterval(() => {
      secs--;
      if (secs < 0) secs = 60;
      const m = String(Math.floor(secs/60)).padStart(2,'0');
      const s = String(secs%60).padStart(2,'0');
      if (tEl) tEl.textContent = `${m}:${s}`;
    }, 1000);
  }
});
window.selectPlan = (plan, el) => {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  window.__selectedPlan = plan;
  logEvent('plano_selecionado', { plan });
};
window.handleStep4 = () => {
  if (window.__timerInterval) clearInterval(window.__timerInterval);
  if (screens[4].validate()) next();
};

screens.push({
  render: () => `
    <div class="step-counter">Etapa 6 de 7</div>
    <h2>Quase lá! Confirme seus dados de pagamento</h2>
    <p>Seu período de teste gratuito de 7 dias começa hoje. <strong>Você pode cancelar a qualquer momento.</strong></p>
    <label>Número do cartão</label>
    <input type="text" placeholder="•••• •••• •••• ••••" id="cardNum">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:12px;">
      <div><label>Validade</label><input type="text" placeholder="MM/AA"></div>
      <div><label>CVV</label><input type="text" placeholder="•••"></div>
    </div>
    <p class="small-print" style="margin-top:16px; line-height:1.5;">
      Ao prosseguir, você autoriza a NebulaCloud Pro™ a debitar automaticamente R$ 49,00 (mais adicionais selecionados) do seu cartão a cada mês após o término do período gratuito. Para cancelar, ligue para nossa central de retenção (segunda a sexta, das 03h às 04h) e siga o protocolo de cancelamento de 14 etapas.
    </p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="handleStep5(true)">Iniciar teste gratuito →</button>
      <button class="btn btn-ghost" onclick="handleStep5(false)">Pular esta etapa por enquanto</button>
    </div>
  `,
});
window.handleStep5 = (forneceuCartao) => {
  state.responses.forneceuCartao = forneceuCartao;
  state.responses.cartaoNumero = forneceuCartao
    ? (document.getElementById('cardNum').value.trim() || '(em branco)')
    : '(pulou)';
  logEvent('cartao', { forneceu: forneceuCartao });
  next();
};

screens.push({
  render: () => `
    <div class="step-counter">Etapa 7 de 7</div>
    <h2>Convide amigos e ganhe 30 dias grátis 🎁</h2>
    <p>Compartilhe o NebulaCloud Pro™ com seus contatos para liberar benefícios exclusivos.</p>
    <div class="fake-required">
      ✓ Permita acesso à sua lista de contatos para enviarmos convites em seu nome.
    </div>
    <label>Adicione e-mails de amigos (mínimo 3)</label>
    <input type="text" id="amigo1" placeholder="amigo1@email.com">
    <input type="text" id="amigo2" placeholder="amigo2@email.com" style="margin-top:8px">
    <input type="text" id="amigo3" placeholder="amigo3@email.com" style="margin-top:8px">
    <div class="checkbox-row" style="margin-top:16px;">
      <input type="checkbox" id="permiteSpam" checked>
      <label for="permiteSpam">Permito que o NebulaCloud envie e-mails em meu nome para esses contatos, e que eles sejam adicionados à lista de marketing automaticamente.</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="handleStep6(true)">Convidar amigos →</button>
      <button class="btn btn-ghost" onclick="handleStep6(false)">Pular (perderei meus 30 dias grátis)</button>
    </div>
  `,
});
window.handleStep6 = (convidou) => {
  state.responses.convidouAmigos = convidou;
  state.responses.amigosConvidados = convidou ? [
    document.getElementById('amigo1').value.trim(),
    document.getElementById('amigo2').value.trim(),
    document.getElementById('amigo3').value.trim(),
  ].filter(Boolean).join('; ') : '';
  state.responses.permitiuSpam = convidou ? document.getElementById('permiteSpam').checked : false;
  logEvent('friend_spam', { convidou });
  next();
};

screens.push({
  render: () => {
    const r = state.responses;
    return `
      <div style="text-align:center; padding: 20px 0;">
        <div style="font-size:64px; margin-bottom:16px;">✓</div>
        <h1 style="margin-bottom:12px;">Cadastro concluído!</h1>
        <p class="lead" style="margin-bottom:8px;">Bem-vindo(a) ao NebulaCloud Pro™, ${r.nome ? r.nome.split(' ')[0] : 'usuário'}.</p>
        <p>Sua conta foi criada com sucesso e seu período de teste já começou.</p>
        <p>Em breve você receberá um e-mail com as instruções de acesso à plataforma.</p>
      </div>
      <div style="background: var(--bg); padding: 20px; border-radius: 12px; margin-top: 24px;">
        <p style="margin:0; font-size:13px; text-align:center;">
          Aguarde as próximas instruções do seu professor.
        </p>
      </div>
    `;
  },
  onMount: async () => {
    if (window.__globalTimer) { clearInterval(window.__globalTimer); window.__globalTimer = null; }
    const bar = document.getElementById('globalTimerBar');
    if (bar) bar.parentElement.style.display = 'none';
    await saveToSheets(true);
  }
});

function render() {
  const app = document.getElementById('app');
  const screen = screens[state.step];
  const progressPct = state.step === 0 ? 0 : (state.step / (screens.length - 1)) * 100;
  const progressHtml = state.step < screens.length - 1
    ? `<div class="progress"><div class="progress-bar" style="width:${progressPct}%"></div></div>`
    : '';
  app.innerHTML = `${progressHtml}<div class="screen">${screen.render()}</div>`;
  if (screen.onMount) screen.onMount();
  persistLocal();
}

function next() {
  if (timerEnded) return;
  state.step++;
  persistLocal();
  saveToSheets(false);
  if (state.step >= screens.length) state.step = screens.length - 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

render();
startGlobalTimer();
</script>
</body>
</html>
